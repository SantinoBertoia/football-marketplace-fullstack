springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/marketplace_football_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:football_marketplace_app}
spring.datasource.password=${DB_PASSWORD:replace_with_local_database_password}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

application.security.jwt.secretKey=${JWT_SECRET:replace_with_a_strong_jwt_secret_at_least_32_chars}
application.security.jwt.expiration=${JWT_EXPIRATION_MS:86400000}
